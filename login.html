<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Game Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #2a2a3a;
      --gold:      #c9a84c;
      --gold-dim:  #8a6f2e;
      --cream:     #f0e8d0;
      --muted:     #6b6b7e;
      --error:     #e05555;
      --success:   #4caf7d;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Crimson Pro', Georgia, serif;
      overflow: hidden;
    }

    /* ── Background chessboard pattern ── */
    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      opacity: 0.04;
      background-image:
        repeating-conic-gradient(#fff 0% 25%, transparent 0% 50%);
      background-size: 60px 60px;
      animation: drift 60s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ── Radial glow ── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 40%, #c9a84c12 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold-dim);
      padding: 3rem 2.5rem;
      position: relative;
      animation: rise .6s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    /* corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--gold-dim);
      border-style: solid;
    }
    .card::before { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .card::after  { bottom: -1px; left:  -1px; border-width: 0 0 2px 2px; }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      font-size: 2.4rem;
      display: block;
      margin-bottom: .4rem;
      filter: drop-shadow(0 0 12px #c9a84c55);
    }

    .brand h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: .15em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .brand p {
      font-size: .95rem;
      color: var(--muted);
      font-style: italic;
      margin-top: .3rem;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .45rem;
    }

    input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      padding: .7rem .9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      border-radius: 0;
      -webkit-appearance: none;
    }

    input::placeholder { color: #3a3a4a; }

    input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 2px #c9a84c18;
    }

    /* ── Submit button ── */
    .btn-primary {
      width: 100%;
      margin-top: 1.8rem;
      padding: .85rem;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .25s, background .25s, box-shadow .25s;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 0;
    }

    .btn-primary:hover::before  { transform: translateX(0); }
    .btn-primary:hover          { color: #0a0a0f; box-shadow: 0 0 24px #c9a84c44; }
    .btn-primary span           { position: relative; z-index: 1; }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin: 1.6rem 0 1.2rem;
      color: var(--border);
      font-size: .8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Forgot / Links ── */
    .forgot {
      text-align: right;
      margin-top: .4rem;
    }

    .forgot a, .link {
      color: var(--gold-dim);
      font-size: .9rem;
      font-style: italic;
      text-decoration: none;
      transition: color .2s;
    }

    .forgot a:hover, .link:hover { color: var(--gold); }

    .signup-row {
      margin-top: 2rem;
      text-align: center;
      font-size: .95rem;
      color: var(--muted);
    }

    /* ── Status messages ── */
    .msg {
      padding: .65rem .9rem;
      font-size: .9rem;
      margin-bottom: 1rem;
      display: none;
    }

    .msg.error   { background: #e0555512; border-left: 3px solid var(--error);   color: var(--error);   display: block; }
    .msg.success { background: #4caf7d12; border-left: 3px solid var(--success); color: var(--success); display: block; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-glow"></div>

<div class="page">
  <div class="card">

    <div class="brand">
      <span class="brand-icon">♛</span>
      <h1>Game Arena</h1>
      <p>Enter the board</p>
    </div>

    <div id="msg" class="msg"></div>

    <form id="loginForm" novalidate>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <div class="forgot">
        <a href="#" id="forgotLink">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span id="btnText">Sign In</span>
      </button>

    </form>

    <div class="divider">or</div>

    <div class="signup-row">
      New to Game Arena? <a href="signup.html" class="link">Create an account</a>
    </div>

  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth,
           signInWithEmailAndPassword,
           sendPasswordResetEmail,
           onAuthStateChanged }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── Firebase config (same as firebase-config.js) ──
  const firebaseConfig = {
    apiKey:            "AIzaSyD37HMOW2F3bNIlN8A2uZKz3Jha6PTpdRM",
    authDomain:        "game-arena-30870.firebaseapp.com",
    databaseURL:       "https://game-arena-30870-default-rtdb.firebaseio.com",
    projectId:         "game-arena-30870",
    storageBucket:     "game-arena-30870.firebasestorage.app",
    messagingSenderId: "229549562058",
    appId:             "1:229549562058:web:a1c6106644379c2d2187c33",
    measurementId:     "G-LC5EJVLTLQ",
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Redirect if already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "index.html";
  });

  // ── UI helpers ──
  const form      = document.getElementById("loginForm");
  const emailEl   = document.getElementById("email");
  const passEl    = document.getElementById("password");
  const msgEl     = document.getElementById("msg");
  const submitBtn = document.getElementById("submitBtn");
  const btnText   = document.getElementById("btnText");

  function showMsg(text, type = "error") {
    msgEl.textContent = text;
    msgEl.className   = `msg ${type}`;
  }

  function clearMsg() {
    msgEl.className = "msg";
    msgEl.textContent = "";
  }

  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.innerHTML  = on
      ? '<span class="spinner"></span>Signing in…'
      : "Sign In";
  }

  function friendlyError(code) {
    const map = {
      "auth/invalid-email":       "Please enter a valid email address.",
      "auth/user-not-found":      "No account found with that email.",
      "auth/wrong-password":      "Incorrect password.",
      "auth/invalid-credential":  "Invalid email or password.",
      "auth/too-many-requests":   "Too many attempts — please wait a moment.",
      "auth/network-request-failed": "Network error. Check your connection.",
    };
    return map[code] || "Something went wrong. Please try again.";
  }

  // ── Login ──
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMsg();

    const email    = emailEl.value.trim();
    const password = passEl.value;

    if (!email || !password) {
      showMsg("Please fill in all fields.");
      return;
    }

    setLoading(true);

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged will redirect
    } catch (err) {
      showMsg(friendlyError(err.code));
      setLoading(false);
    }
  });

  // ── Forgot password ──
  document.getElementById("forgotLink").addEventListener("click", async (e) => {
    e.preventDefault();
    clearMsg();

    const email = emailEl.value.trim();
    if (!email) {
      showMsg("Enter your email above, then click this link.");
      return;
    }

    try {
      await sendPasswordResetEmail(auth, email);
      showMsg("Reset email sent — check your inbox.", "success");
    } catch (err) {
      showMsg(friendlyError(err.code));
    }
  });
</script>

</body>
</html>

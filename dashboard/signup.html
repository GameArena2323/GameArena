<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Game Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #2a2a3a;
      --gold:      #c9a84c;
      --gold-dim:  #8a6f2e;
      --cream:     #f0e8d0;
      --muted:     #6b6b7e;
      --error:     #e05555;
      --success:   #4caf7d;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Crimson Pro', Georgia, serif;
    }

    .bg-pattern {
      position: fixed; inset: 0; z-index: 0;
      opacity: 0.04;
      background-image: repeating-conic-gradient(#fff 0% 25%, transparent 0% 50%);
      background-size: 60px 60px;
      animation: drift 60s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 40%, #c9a84c12 0%, transparent 70%);
      pointer-events: none;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold-dim);
      padding: 3rem 2.5rem;
      position: relative;
      animation: rise .6s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--gold-dim);
      border-style: solid;
    }
    .card::before { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .card::after  { bottom: -1px; left:  -1px; border-width: 0 0 2px 2px; }

    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      font-size: 2.4rem;
      display: block;
      margin-bottom: .4rem;
      filter: drop-shadow(0 0 12px #c9a84c55);
    }

    .brand h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: .15em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .brand p {
      font-size: .95rem;
      color: var(--muted);
      font-style: italic;
      margin-top: .3rem;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 1.2rem;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
    }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .45rem;
    }

    input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      padding: .7rem .9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      border-radius: 0;
      -webkit-appearance: none;
    }

    input::placeholder { color: #3a3a4a; }

    input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 2px #c9a84c18;
    }

    input.invalid {
      border-color: var(--error);
      box-shadow: 0 0 0 2px #e0555512;
    }

    input.valid {
      border-color: var(--success);
    }

    /* ── Password strength ── */
    .strength-bar {
      margin-top: .4rem;
      height: 3px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width .3s, background .3s;
    }

    .strength-label {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .3rem;
      font-style: italic;
    }

    /* ── Username availability badge ── */
    .field-note {
      font-size: .78rem;
      margin-top: .3rem;
      min-height: 1.1em;
      font-style: italic;
    }
    .field-note.ok  { color: var(--success); }
    .field-note.err { color: var(--error);   }
    .field-note.checking { color: var(--muted); }

    /* ── Requirements list ── */
    .requirements {
      margin-top: .5rem;
      padding: .7rem .9rem;
      background: #0d0d14;
      border: 1px solid var(--border);
      list-style: none;
      font-size: .82rem;
    }

    .requirements li {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .15rem 0;
      color: var(--muted);
      transition: color .2s;
    }

    .requirements li.met { color: var(--success); }

    .requirements li::before {
      content: '○';
      font-size: .6rem;
    }

    .requirements li.met::before { content: '●'; }

    /* ── Button ── */
    .btn-primary {
      width: 100%;
      margin-top: 1.8rem;
      padding: .85rem;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .25s, background .25s, box-shadow .25s;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 0;
    }

    .btn-primary:hover::before  { transform: translateX(0); }
    .btn-primary:hover          { color: #0a0a0f; box-shadow: 0 0 24px #c9a84c44; }
    .btn-primary span           { position: relative; z-index: 1; }
    .btn-primary:disabled       { opacity: .5; cursor: not-allowed; }

    /* ── Messages ── */
    .msg {
      padding: .65rem .9rem;
      font-size: .9rem;
      margin-bottom: 1rem;
      display: none;
    }

    .msg.error   { background: #e0555512; border-left: 3px solid var(--error);   color: var(--error);   display: block; }
    .msg.success { background: #4caf7d12; border-left: 3px solid var(--success); color: var(--success); display: block; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .login-row {
      margin-top: 2rem;
      text-align: center;
      font-size: .95rem;
      color: var(--muted);
    }

    .link {
      color: var(--gold-dim);
      font-style: italic;
      text-decoration: none;
      transition: color .2s;
    }

    .link:hover { color: var(--gold); }

    .terms {
      margin-top: 1.2rem;
      text-align: center;
      font-size: .78rem;
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-glow"></div>

<div class="page">
  <div class="card">

    <div class="brand">
      <span class="brand-icon">♛</span>
      <h1>Game Arena</h1>
      <p>Create your account</p>
    </div>

    <div id="msg" class="msg"></div>

    <form id="signupForm" novalidate>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="YourChessName" maxlength="20" autocomplete="off" required />
        <div class="field-note" id="usernameNote"></div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required />
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" required />
        <div class="field-note" id="confirmNote"></div>
      </div>

      <ul class="requirements" id="reqs" style="display:none">
        <li id="req-len">At least 6 characters</li>
        <li id="req-upper">One uppercase letter</li>
        <li id="req-num">One number</li>
      </ul>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span id="btnText">Create Account</span>
      </button>

    </form>

    <div class="login-row">
      Already have an account? <a href="login.html" class="link">Sign in</a>
    </div>

    <p class="terms">By signing up you agree to the rules of the board.</p>
  </div>
</div>

<script type="module">
  import { initializeApp }                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth,
           createUserWithEmailAndPassword,
           updateProfile,
           onAuthStateChanged }                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore,
           doc,
           setDoc,
           getDoc,
           serverTimestamp }                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyD37HMOW2F3bNIlN8A2uZKz3Jha6PTpdRM",
    authDomain:        "game-arena-30870.firebaseapp.com",
    databaseURL:       "https://game-arena-30870-default-rtdb.firebaseio.com",
    projectId:         "game-arena-30870",
    storageBucket:     "game-arena-30870.firebasestorage.app",
    messagingSenderId: "229549562058",
    appId:             "1:229549562058:web:a1c6106644379c2d2187c33",
    measurementId:     "G-LC5EJVLTLQ",
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Redirect if already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.href = "index.html";
  });

  // ── Elements ──
  const form        = document.getElementById("signupForm");
  const usernameEl  = document.getElementById("username");
  const emailEl     = document.getElementById("email");
  const passEl      = document.getElementById("password");
  const confirmEl   = document.getElementById("confirm");
  const msgEl       = document.getElementById("msg");
  const submitBtn   = document.getElementById("submitBtn");
  const btnText     = document.getElementById("btnText");
  const usernameNote= document.getElementById("usernameNote");
  const confirmNote = document.getElementById("confirmNote");
  const reqs        = document.getElementById("reqs");
  const strengthFill= document.getElementById("strengthFill");
  const strengthLabel=document.getElementById("strengthLabel");

  // ── Helpers ──
  function showMsg(text, type = "error") {
    msgEl.textContent = text;
    msgEl.className   = `msg ${type}`;
  }

  function clearMsg() {
    msgEl.className = "msg";
    msgEl.textContent = "";
  }

  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.innerHTML  = on
      ? '<span class="spinner"></span>Creating account…'
      : "Create Account";
  }

  function friendlyError(code) {
    const map = {
      "auth/email-already-in-use": "That email is already registered.",
      "auth/invalid-email":        "Please enter a valid email address.",
      "auth/weak-password":        "Password must be at least 6 characters.",
      "auth/network-request-failed": "Network error. Check your connection.",
    };
    return map[code] || "Something went wrong. Please try again.";
  }

  // ── Username validation & availability ──
  const VALID_USERNAME = /^[a-zA-Z0-9_]{3,20}$/;
  let usernameCheckTimer;
  let usernameAvailable = false;

  usernameEl.addEventListener("input", () => {
    const val = usernameEl.value.trim();
    clearTimeout(usernameCheckTimer);

    if (!val) {
      usernameNote.textContent = "";
      usernameNote.className   = "field-note";
      usernameEl.classList.remove("valid", "invalid");
      usernameAvailable = false;
      return;
    }

    if (!VALID_USERNAME.test(val)) {
      usernameNote.textContent = "3–20 chars, letters/numbers/underscore only.";
      usernameNote.className   = "field-note err";
      usernameEl.classList.remove("valid");
      usernameEl.classList.add("invalid");
      usernameAvailable = false;
      return;
    }

    usernameNote.textContent = "Checking availability…";
    usernameNote.className   = "field-note checking";
    usernameEl.classList.remove("valid", "invalid");

    usernameCheckTimer = setTimeout(async () => {
      try {
        const snap = await getDoc(doc(db, "usernames", val.toLowerCase()));
        if (snap.exists()) {
          usernameNote.textContent = "Username is taken.";
          usernameNote.className   = "field-note err";
          usernameEl.classList.remove("valid");
          usernameEl.classList.add("invalid");
          usernameAvailable = false;
        } else {
          usernameNote.textContent = "Available ✓";
          usernameNote.className   = "field-note ok";
          usernameEl.classList.remove("invalid");
          usernameEl.classList.add("valid");
          usernameAvailable = true;
        }
      } catch {
        usernameNote.textContent = "";
        usernameAvailable = true; // allow optimistic continue
      }
    }, 600);
  });

  // ── Password strength ──
  passEl.addEventListener("focus", () => reqs.style.display = "block");

  passEl.addEventListener("input", () => {
    const v = passEl.value;

    // Requirements
    document.getElementById("req-len").classList.toggle("met",   v.length >= 6);
    document.getElementById("req-upper").classList.toggle("met", /[A-Z]/.test(v));
    document.getElementById("req-num").classList.toggle("met",   /[0-9]/.test(v));

    // Strength score
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^a-zA-Z0-9]/.test(v)) score++;

    const levels = [
      { pct: 0,   color: "",              label: "" },
      { pct: 20,  color: "#e05555",       label: "Weak" },
      { pct: 40,  color: "#e07a30",       label: "Fair" },
      { pct: 60,  color: "#d4b84a",       label: "Good" },
      { pct: 80,  color: "#4caf7d",       label: "Strong" },
      { pct: 100, color: "#4caf7d",       label: "Very strong" },
    ];

    const lvl = levels[Math.min(score, 5)];
    strengthFill.style.width      = lvl.pct + "%";
    strengthFill.style.background = lvl.color;
    strengthLabel.textContent     = lvl.label;

    // Re-check confirm match
    if (confirmEl.value) checkConfirm();
  });

  // ── Confirm password ──
  function checkConfirm() {
    if (!confirmEl.value) { confirmNote.textContent = ""; return; }
    const match = confirmEl.value === passEl.value;
    confirmNote.textContent = match ? "Passwords match ✓" : "Passwords do not match.";
    confirmNote.className   = `field-note ${match ? "ok" : "err"}`;
    confirmEl.classList.toggle("valid",   match);
    confirmEl.classList.toggle("invalid", !match);
  }

  confirmEl.addEventListener("input", checkConfirm);

  // ── Submit ──
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMsg();

    const username = usernameEl.value.trim();
    const email    = emailEl.value.trim();
    const password = passEl.value;
    const confirm  = confirmEl.value;

    // Client-side validation
    if (!username || !email || !password || !confirm) {
      showMsg("Please fill in all fields.");
      return;
    }

    if (!VALID_USERNAME.test(username)) {
      showMsg("Username: 3–20 chars, letters/numbers/underscore only.");
      return;
    }

    if (!usernameAvailable) {
      showMsg("That username is not available.");
      return;
    }

    if (password.length < 6) {
      showMsg("Password must be at least 6 characters.");
      return;
    }

    if (password !== confirm) {
      showMsg("Passwords do not match.");
      return;
    }

    setLoading(true);

    try {
      // Double-check username in Firestore
      const taken = await getDoc(doc(db, "usernames", username.toLowerCase()));
      if (taken.exists()) {
        showMsg("That username was just taken — please choose another.");
        setLoading(false);
        return;
      }

      // Create auth account
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const user = cred.user;

      await updateProfile(user, { displayName: username });

      // Create Firestore profile
      await setDoc(doc(db, "users", user.uid), {
        username,
        usernameLower: username.toLowerCase(),
        email,
        avatar:   null,
        isPublic: true,
        createdAt: serverTimestamp(),
        stats: {
          wins: 0, losses: 0, draws: 0,
          gamesPlayed: 0, winRate: 0,
          elo: 0, eloHigh: 0,
        },
      });

      // Reserve username
      await setDoc(doc(db, "usernames", username.toLowerCase()), { uid: user.uid });

      // Create leaderboard entry
      await setDoc(doc(db, "leaderboard", user.uid), {
        username,
        wins: 0, losses: 0, draws: 0,
        gamesPlayed: 0, winRate: 0,
        elo: 0, eloHigh: 0,
        isPublic: true,
      });

      showMsg("Account created! Redirecting…", "success");
      setTimeout(() => window.location.href = "index.html", 1000);

    } catch (err) {
      showMsg(friendlyError(err.code));
      setLoading(false);
    }
  });
</script>

</body>
</html>
